<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Kori Frazier Photography</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Open+Sans&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <nav class="navbar">
      <ul class="menu">
      <li><a href="home.html">Home</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <img src="Images/KoriPhotoLogo.PNG" alt="Floral logo">
    <h1>Contact</h1>
    <h2>I offer family sessions, maternity, newborn, and couples photography!</h2>
    <h1>Want to know more, or book a session? Use the contact form below!</h1>
  </header>

<main>
  <div class="container">
    <h2>Contact Me</h2>
    <form id="contactForm" action="/submit-form" method="POST">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>
      <button type="submit">Send Message</button>
    </form>
  </div>
</main>
</body>
</html>
